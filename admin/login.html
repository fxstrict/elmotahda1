<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | لوحة تحكم الأدمن</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="../assets/images/brand/favicon.png">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <img class="logo-mark" src="../assets/images/brand/logo-icon.png" alt="شعار الشركة المتحدة">
    <h1>لوحة تحكم الأدمن</h1>
    <p class="sub">الشركة المتحدة لقطع غيار التبريد والتكييف والغسالات</p>

    <div class="admin-error" id="login-error">اسم المستخدم أو كلمة المرور غير صحيحة.</div>

    <form id="login-form">
      <div class="admin-field">
        <label for="username">اسم المستخدم</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>
      <div class="admin-field">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="admin-btn">تسجيل الدخول</button>
    </form>

    <p class="admin-hint">
      بيانات الدخول الافتراضية: <strong>hos</strong> / <strong>111</strong><br>
      يمكن تغييرها لاحقاً من داخل الإعدادات بعد الدخول.
    </p>
  </div>
</div>

<script src="../assets/js/admin-store.js"></script>
<script>
  // إن كان مسجّلاً دخوله بالفعل، انتقل للوحة مباشرة
  if(AdminStore.isLoggedIn()){
    location.href = "dashboard.html";
  }

  const form = document.getElementById("login-form");
  const errorBox = document.getElementById("login-error");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if(AdminStore.verifyCredentials(username, password)){
      AdminStore.login(username);
      location.href = "dashboard.html";
    }else{
      errorBox.classList.add("show");
      setTimeout(() => errorBox.classList.remove("show"), 3500);
    }
  });
</script>
</body>
</html>
